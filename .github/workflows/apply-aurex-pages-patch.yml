name: Apply AUREX Pages Patch

on:
  push:
    paths:
      - .github/aurex-pages-payload.txt

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Decode patch
        run: |
          python3 - <<'PY'
          import base64, gzip, pathlib
          payload = pathlib.Path('.github/aurex-pages-payload.txt').read_text(encoding='ascii').strip()
          patch = gzip.decompress(base64.b64decode(payload))
          pathlib.Path('/tmp/aurex-pages.patch').write_bytes(patch)
          print(f'Decoded patch bytes: {len(patch)}')
          PY
      - name: Apply patch
        run: git apply --index /tmp/aurex-pages.patch
      - name: Run tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests -v
      - name: Generate static site
        run: PYTHONPATH=src python3 -m aurex.static_site --output-dir public --domain aurex.archive.trading
      - name: Verify static artifact
        run: |
          test "$(cat public/CNAME)" = "aurex.archive.trading"
          test -f public/index.html
          test -f public/api/dashboard.json
          test -f public/api/learning.json
      - name: Remove temporary deploy files
        run: git rm -f .github/aurex-pages-payload.txt .github/workflows/apply-aurex-pages-patch.yml
      - name: Commit and push
        run: |
          git config user.name "aurex-deploy-bot"
          git config user.email "aurex-deploy-bot@users.noreply.github.com"
          git commit -m "Add AUREX public Pages deployment"
          git push
