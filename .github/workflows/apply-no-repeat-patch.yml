name: Temporary Apply No Repeat Patch

on:
  push:
    paths:
      - ".github/apply-no-repeat-trigger.txt"

permissions:
  contents: write

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Apply no-repeat code patch and test
        run: |
          git apply --index .github/no-repeat.patch
          PYTHONPATH=src python3 -m unittest discover -s tests -v
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "Persist digest ticker history"
          git rm .github/no-repeat.patch .github/apply-no-repeat-trigger.txt
          git commit -m "Remove temporary no-repeat patch files [skip ci]"
          git push
