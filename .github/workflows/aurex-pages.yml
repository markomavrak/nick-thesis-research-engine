name: Deploy AUREX Public Site

on:
  push:
    branches:
      - main
  schedule:
    # Refresh the public dashboard before the North American market opens.
    - cron: "30 12 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: aurex-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests -v

      - name: Generate public AUREX site
        run: PYTHONPATH=src python3 -m aurex.static_site --output-dir public --domain aurex.archive.trading

      - name: Verify custom domain artifact
        run: |
          test "$(cat public/CNAME)" = "aurex.archive.trading"
          test -f public/index.html
          test -f public/api/dashboard.json
          test -f public/api/learning.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
