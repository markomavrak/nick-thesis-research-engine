name: Daily Stock Research Email

on:
  schedule:
    # GitHub cron is UTC. 13:00 UTC is 9 AM Toronto during daylight time;
    # 14:00 UTC is 9 AM Toronto during standard time. The app gates by
    # America/Toronto, so only the matching run sends and the other skips.
    - cron: "0 13,14 * * *"
  workflow_dispatch:
    inputs:
      send_live:
        description: "Send a live digest now instead of a dry-run preview"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests -v

      - name: Send scheduled digest
        if: github.event_name == 'schedule'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || secrets.RESEARCH_ENGINE }}
          RESEND_FROM_EMAIL: Market Research <onboarding@resend.dev>
          DIGEST_RECIPIENTS: marko@advertra.ca
        run: PYTHONPATH=src python3 -m nick_engine.daily_digest

      - name: Preview manual run
        if: github.event_name == 'workflow_dispatch' && inputs.send_live != 'true'
        run: PYTHONPATH=src python3 -m nick_engine.daily_digest --dry-run --force

      - name: Send manual live digest
        if: github.event_name == 'workflow_dispatch' && inputs.send_live == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || secrets.RESEARCH_ENGINE }}
          RESEND_FROM_EMAIL: Market Research <onboarding@resend.dev>
          DIGEST_RECIPIENTS: marko@advertra.ca
        run: PYTHONPATH=src python3 -m nick_engine.daily_digest --force
