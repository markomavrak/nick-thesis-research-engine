name: Daily Stock Research Email

on:
  schedule:
    # GitHub cron is UTC. 13:00 UTC is 9 AM Toronto during daylight time;
    # 14:00 UTC is 9 AM Toronto during standard time. The app gates by
    # America/Toronto, so only the matching run sends and the other skips.
    - cron: "0 13,14 * * *"
  workflow_dispatch:
    inputs:
      send_live:
        description: "Send a live digest now instead of a dry-run preview"
        required: true
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: write

jobs:
  daily-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests -v

      - name: Send scheduled digest
        if: github.event_name == 'schedule'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || secrets.RESEARCH_ENGINE }}
          RESEND_FROM_EMAIL: Aurex Research <research@updates.advertra.ca>
        run: PYTHONPATH=src python3 -m aurex.daily_digest

      - name: Preview manual run
        if: github.event_name == 'workflow_dispatch' && inputs.send_live != 'true'
        run: PYTHONPATH=src python3 -m aurex.daily_digest --dry-run --force

      - name: Send manual live digest
        if: github.event_name == 'workflow_dispatch' && inputs.send_live == 'true'
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || secrets.RESEARCH_ENGINE }}
          RESEND_FROM_EMAIL: Aurex Research <research@updates.advertra.ca>
        run: PYTHONPATH=src python3 -m aurex.daily_digest --force

      - name: Persist digest history
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && inputs.send_live == 'true')
        run: |
          if [ -z "$(git status --porcelain -- .github/digest-history.json)" ]; then
            echo "No digest history changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/digest-history.json
          git commit -m "Update digest history [skip ci]"
          git push
