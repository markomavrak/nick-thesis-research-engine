name: Manual Live Digest Trigger

on:
  push:
    paths:
      - ".github/live-digest-trigger.txt"

permissions:
  contents: write

jobs:
  send-live-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Configure Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: PYTHONPATH=src python3 -m unittest discover -s tests -v

      - name: Send live digest
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || secrets.RESEARCH_ENGINE }}
          RESEND_FROM_EMAIL: Market Research <research@updates.advertra.ca>
        run: PYTHONPATH=src python3 -m nick_engine.daily_digest --force

      - name: Persist digest history
        run: |
          if [ -z "$(git status --porcelain -- .github/digest-history.json)" ]; then
            echo "No digest history changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/digest-history.json
          git commit -m "Update digest history [skip ci]"
          git push
