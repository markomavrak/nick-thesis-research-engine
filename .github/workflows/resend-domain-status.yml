name: Resend Domain Status

on:
  push:
    paths:
      - ".github/resend-domain-status-trigger.txt"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-resend-domain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Advertra domain status in Resend
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || secrets.RESEARCH_ENGINE }}
        run: |
          python3 <<'PY'
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          api_key = os.environ.get("RESEND_API_KEY", "").strip()
          if not api_key:
              raise SystemExit("RESEND_API_KEY / RESEARCH_ENGINE secret is missing")

          base_url = "https://api.resend.com"
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json",
              "User-Agent": "codex-resend-domain-status/1.0",
          }

          def call(method, path, payload=None):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(
                  base_url + path,
                  data=data,
                  method=method,
                  headers=headers,
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode("utf-8")
                      return json.loads(body) if body else {}
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  print(f"HTTP {exc.code} from {method} {path}: {body}")
                  raise

          target_name = "advertra.ca"
          listed = call("GET", "/domains")
          domains = listed.get("data", []) if isinstance(listed, dict) else []
          domain = next((item for item in domains if item.get("name") == target_name), None)

          if domain is None:
              print("advertra.ca was not found in Resend. Creating it now.")
              domain = call("POST", "/domains", {"name": target_name})
          else:
              print("advertra.ca already exists in Resend.")

          domain_id = domain.get("id")
          if not domain_id:
              print(json.dumps(domain, indent=2))
              raise SystemExit("Resend did not return a domain id")

          detail = call("GET", f"/domains/{domain_id}")
          print(f"Domain: {detail.get('name')} | id: {domain_id} | status: {detail.get('status')} | region: {detail.get('region')}")

          if detail.get("status") != "verified":
              print("Requesting Resend DNS verification check now.")
              verify_result = call("POST", f"/domains/{domain_id}/verify")
              print("Verify endpoint response:")
              print(json.dumps({k: v for k, v in verify_result.items() if k != "records"}, indent=2))
              detail = call("GET", f"/domains/{domain_id}")
              print(f"Status after verify request: {detail.get('status')}")

          print("Required DNS records:")
          for record in detail.get("records", []):
              priority = record.get("priority")
              priority_text = f" priority={priority}" if priority is not None else ""
              print(
                  f"- {record.get('record')} {record.get('type')} "
                  f"name={record.get('name')} value={record.get('value')} "
                  f"status={record.get('status')}{priority_text}"
              )
          PY
