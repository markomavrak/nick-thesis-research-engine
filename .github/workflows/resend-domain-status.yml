name: Resend Domain Status

on:
  push:
    paths:
      - ".github/resend-domain-status-trigger.txt"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-resend-domain:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Resend domains
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || secrets.RESEARCH_ENGINE }}
        run: |
          python3 <<'PY'
          import json
          import os
          import urllib.error
          import urllib.request

          api_key = os.environ.get("RESEND_API_KEY", "").strip()
          if not api_key:
              raise SystemExit("RESEND_API_KEY / RESEARCH_ENGINE secret is missing")

          base_url = "https://api.resend.com"
          headers = {
              "Authorization": f"Bearer {api_key}",
              "Content-Type": "application/json",
              "User-Agent": "codex-resend-domain-status/1.0",
          }

          def call(method, path, payload=None, raise_errors=True):
              data = None
              if payload is not None:
                  data = json.dumps(payload).encode("utf-8")
              request = urllib.request.Request(
                  base_url + path,
                  data=data,
                  method=method,
                  headers=headers,
              )
              try:
                  with urllib.request.urlopen(request, timeout=30) as response:
                      body = response.read().decode("utf-8")
                      return response.status, json.loads(body) if body else {}
              except urllib.error.HTTPError as exc:
                  body = exc.read().decode("utf-8", errors="replace")
                  print(f"HTTP {exc.code} from {method} {path}: {body}")
                  if raise_errors:
                      raise
                  try:
                      return exc.code, json.loads(body)
                  except json.JSONDecodeError:
                      return exc.code, {"raw": body}

          def print_records(detail):
              records = detail.get("records", [])
              if not records:
                  print("  No DNS records returned.")
                  return
              print("  DNS records:")
              for record in records:
                  priority = record.get("priority")
                  priority_text = f" priority={priority}" if priority is not None else ""
                  print(
                      f"  - {record.get('record')} {record.get('type')} "
                      f"name={record.get('name')} value={record.get('value')} "
                      f"status={record.get('status')}{priority_text}"
                  )

          _, listed = call("GET", "/domains")
          domains = listed.get("data", []) if isinstance(listed, dict) else []

          print("Resend domains in this account:")
          if not domains:
              print("- none")
          for domain in domains:
              print(
                  f"- {domain.get('name')} | id={domain.get('id')} | "
                  f"status={domain.get('status')} | region={domain.get('region')}"
              )

          for domain in domains:
              _, detail = call("GET", f"/domains/{domain.get('id')}")
              print(f"Details for {detail.get('name')} | status={detail.get('status')} | region={detail.get('region')}")
              print_records(detail)

          target_name = "advertra.ca"
          target = next((item for item in domains if item.get("name") == target_name), None)
          if target is None:
              print("advertra.ca is not currently present in this Resend account.")
              print("Attempting to create advertra.ca to confirm whether the plan permits another domain.")
              status, created = call("POST", "/domains", {"name": target_name}, raise_errors=False)
              if status >= 400:
                  print("advertra.ca create attempt failed; leaving account unchanged.")
              else:
                  print(f"advertra.ca created | id={created.get('id')} | status={created.get('status')}")
                  print_records(created)
          else:
              print("advertra.ca exists. Requesting verification check.")
              _, verify_result = call("POST", f"/domains/{target.get('id')}/verify")
              print("Verify endpoint response:")
              print(json.dumps({k: v for k, v in verify_result.items() if k != "records"}, indent=2))
          PY
